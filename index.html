<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0d1210"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Energy Diary"/>
  <meta name="description" content="Track your energy through the working day"/>
  <title>Energy Diary</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0d0d10;
      --bg2: #12111a;
      --bg3: #0d1210;
      --text: #e8e0d0;
      --muted: rgba(255,255,255,0.3);
      --subtle: rgba(255,255,255,0.08);
      --green: #a3c4a0;
      --green-bright: #2ecc71;
      --red: #e74c3c;
      --gold: #f1c40f;
      --orange: #e67e22;
      --serif: 'Playfair Display', Georgia, serif;
      --body: 'Lora', Georgia, serif;
      --mono: 'DM Mono', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      background: linear-gradient(135deg, #0d0d10 0%, #12111a 50%, #0d1210 100%);
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    #app {
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 20px 80px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.22); } 100% { transform: scale(1.18); } }

    /* HEADER */
    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 400;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 28px;
    }

    /* DAY NAVIGATOR */
    .day-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .nav-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 16px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .nav-btn:hover:not(:disabled) { border-color: var(--green); color: var(--green); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    .nav-date {
      flex: 1;
      text-align: center;
    }

    .nav-date-label {
      font-family: var(--serif);
      font-size: clamp(15px, 4vw, 18px);
      color: var(--text);
      display: block;
      line-height: 1.2;
    }

    .nav-today-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--green);
      margin-top: 3px;
    }

    /* TABS */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--subtle);
      margin-bottom: 28px;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 20px 10px;
      transition: all 0.2s;
      margin-bottom: -1px;
    }

    .tab.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    /* VIEWS */
    .view { display: none; visibility: hidden; position: absolute; pointer-events: none; }
    .view.active { display: block; visibility: visible; position: static; pointer-events: auto; }

    /* INSIGHTS */
    .insights {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--subtle);
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 24px;
    }

    .insights-title {
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
      font-weight: 400;
    }

    .insights-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .insight-item {
      flex: 1;
      min-width: 100px;
    }

    .insight-item + .insight-item {
      border-left: 1px solid rgba(255,255,255,0.07);
      padding-left: 16px;
    }

    .insight-label {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .insight-label.green { color: var(--green-bright); }
    .insight-label.red { color: var(--red); }

    .insight-value {
      font-family: var(--serif);
      font-size: 26px;
      color: var(--text);
    }

    .insight-value span { font-size: 13px; color: rgba(255,255,255,0.3); }

    .insight-value-sm {
      font-family: var(--serif);
      font-size: 14px;
      color: var(--text);
    }

    /* ENTRY CARD */
    .entry-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 10px;
      transition: background 0.2s;
      animation: fadeIn 0.3s ease;
    }

    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .entry-activity {
      font-family: var(--serif);
      font-size: 15px;
      color: var(--text);
      font-weight: 600;
    }

    .entry-time-badge {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-left: 8px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.18);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--red); }

    .energy-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .energy-pill {
      font-size: 11px;
      font-family: var(--mono);
      padding: 3px 9px;
      border-radius: 6px;
    }

    .arrow { color: rgba(255,255,255,0.2); font-size: 13px; }

    .delta {
      margin-left: auto;
      font-size: 13px;
      font-family: var(--mono);
    }

    .entry-note {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.42);
      font-style: italic;
      line-height: 1.6;
      border-left: 2px solid rgba(255,255,255,0.1);
      padding-left: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 56px 0;
      color: rgba(255,255,255,0.18);
      font-style: italic;
      font-size: 15px;
      line-height: 1.8;
    }

    /* FORM */
    .field { margin-bottom: 24px; }

    .field-label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .field-label .optional { color: rgba(255,255,255,0.18); }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    .seg-btn {
      flex: 1;
      padding: 10px 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      text-align: center;
    }

    .seg-btn.selected {
      background: rgba(163,196,160,0.15);
      border-color: var(--green);
      color: var(--green);
    }

    /* ACTIVITY PICKER */
    .activity-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .activity-pill {
      padding: 7px 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.5px;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .activity-pill.selected {
      background: rgba(163,196,160,0.15);
      border-color: var(--green);
      color: var(--green);
    }

    .energy-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot-wrap { text-align: center; }

    .energy-dot {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      display: block;
      margin: 0 auto 5px;
    }

    .energy-dot.selected { animation: pop 0.2s ease forwards; }

    .dot-label {
      font-size: 8px;
      color: rgba(255,255,255,0.22);
      font-family: var(--mono);
    }

    textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      padding: 13px 14px;
      color: var(--text);
      font-family: var(--body);
      font-style: italic;
      font-size: 14px;
      resize: none;
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    textarea:focus { outline: none; border-color: rgba(163,196,160,0.35); }
    textarea::placeholder { color: rgba(255,255,255,0.2); }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: rgba(255,255,255,0.06);
      border: none;
      border-radius: 12px;
      color: rgba(255,255,255,0.2);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: not-allowed;
      transition: all 0.25s ease;
      font-weight: 500;
    }

    .submit-btn.ready {
      background: var(--green);
      color: #0d1210;
      cursor: pointer;
    }

    .submit-btn.ready:hover { filter: brightness(1.1); }
    .submit-btn.saved { background: var(--green-bright); color: #fff; }

    /* PATTERNS VIEW */
    .patterns-header {
      margin-bottom: 24px;
    }

    .patterns-scope {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }

    .scope-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.18s;
    }

    .scope-btn.active {
      background: rgba(163,196,160,0.12);
      border-color: var(--green);
      color: var(--green);
    }

    .pattern-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 10px;
      animation: fadeIn 0.3s ease;
    }

    .pattern-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .pattern-name {
      font-family: var(--serif);
      font-size: 15px;
      color: var(--text);
      font-weight: 600;
    }

    .pattern-avg {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 400;
      flex-shrink: 0;
    }

    .pattern-bar-wrap {
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .pattern-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .pattern-meta {
      display: flex;
      gap: 16px;
    }

    .pattern-meta-item {
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
    }

    .pattern-meta-item span {
      color: rgba(255,255,255,0.55);
    }

    .patterns-empty {
      text-align: center;
      padding: 56px 0;
      color: rgba(255,255,255,0.18);
      font-style: italic;
      font-size: 15px;
      line-height: 1.8;
    }

    .patterns-summary {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 0;
    }

    .summary-stat {
      flex: 1;
      text-align: center;
    }

    .summary-stat + .summary-stat {
      border-left: 1px solid rgba(255,255,255,0.07);
    }

    .summary-stat-value {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--text);
      display: block;
      margin-bottom: 3px;
    }

    .summary-stat-label {
      font-family: var(--mono);
      font-size: 9px;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* DATA ACTIONS */
    .data-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .data-btn {
      flex: 1;
      padding: 10px 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.2s;
      text-align: center;
    }

    .data-btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
    .data-btn.export:hover { border-color: var(--green); color: var(--green); }
    .data-btn.import-btn:hover { border-color: #7fb3d3; color: #7fb3d3; }

    .data-btn .btn-icon { display: block; font-size: 16px; margin-bottom: 4px; }

    .import-confirm {
      display: none;
      background: rgba(127,179,211,0.08);
      border: 1px solid rgba(127,179,211,0.25);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 20px;
    }

    .import-confirm.visible { display: block; }
    .import-confirm p { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 12px; font-style: italic; }
    .import-confirm p strong { color: #7fb3d3; font-style: normal; }

    .import-confirm-btns { display: flex; gap: 8px; }

    .confirm-yes {
      flex: 1; padding: 9px; background: #7fb3d3; border: none; border-radius: 8px;
      color: #0d1210; font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
      text-transform: uppercase; cursor: pointer;
    }

    .confirm-no {
      flex: 1; padding: 9px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: rgba(255,255,255,0.4); font-family: var(--mono); font-size: 10px;
      letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
    }

    /* INSTALL BANNER */
    .install-banner {
      display: none;
      background: rgba(163,196,160,0.1);
      border: 1px solid rgba(163,196,160,0.25);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 24px;
      align-items: center;
      gap: 12px;
    }

    .install-banner.visible { display: flex; }

    .install-text { flex: 1; font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.4; }
    .install-text strong { color: var(--green); font-style: normal; }

    .install-btn {
      background: var(--green);
      color: #0d1210;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .install-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="eyebrow">Energy Diary</div>

  <!-- Day Navigator -->
  <div class="day-nav">
    <button class="nav-btn" id="nav-prev" title="Previous day">&#8592;</button>
    <div class="nav-date">
      <span class="nav-date-label" id="date-heading"></span>
      <span class="nav-today-badge" id="today-badge" style="display:none">Today</span>
    </div>
    <button class="nav-btn" id="nav-next" title="Next day" disabled>&#8594;</button>
  </div>

  <p class="subtitle" id="subtitle">Log your first entry for today</p>

  <!-- Install Banner -->
  <div class="install-banner" id="install-banner">
    <div class="install-text"><strong>Add to Home Screen</strong><br>Install for quick daily access</div>
    <button class="install-btn" id="install-btn">Install</button>
    <button class="install-close" id="install-close">×</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="log">Log</button>
    <button class="tab" data-tab="patterns">Patterns</button>
    <button class="tab" data-tab="add">+ New Entry</button>
  </div>

  <!-- LOG VIEW -->
  <div class="view active" id="view-log">
    <div id="insights-panel"></div>
    <div id="entries-list"></div>

    <!-- Export / Import -->
    <div class="data-actions" id="data-actions">
      <button class="data-btn export" id="export-btn">
        <span class="btn-icon">↓</span>Export JSON
      </button>
      <button class="data-btn import-btn" id="import-trigger-btn">
        <span class="btn-icon">↑</span>Import JSON
      </button>
    </div>

    <div class="import-confirm" id="import-confirm">
      <p id="import-confirm-msg">Loading…</p>
      <div class="import-confirm-btns">
        <button class="confirm-yes" id="confirm-yes-btn">Merge & Import</button>
        <button class="confirm-no" id="confirm-no-btn">Cancel</button>
      </div>
    </div>

    <input type="file" id="file-input" accept=".json" style="display:none"/>
  </div>

  <!-- PATTERNS VIEW -->
  <div class="view" id="view-patterns">
    <div class="patterns-scope">
      <button class="scope-btn active" data-scope="7">7 days</button>
      <button class="scope-btn" data-scope="30">30 days</button>
      <button class="scope-btn" data-scope="all">All time</button>
    </div>
    <div id="patterns-summary"></div>
    <div id="patterns-list"></div>
  </div>

  <!-- ADD VIEW -->
  <div class="view" id="view-add">

    <div class="field">
      <label class="field-label">Time of Day</label>
      <div class="btn-group" id="time-group">
        <button class="seg-btn selected" data-time="Morning">Morning</button>
        <button class="seg-btn" data-time="After Lunch">After Lunch</button>
        <button class="seg-btn" data-time="End of Day">End of Day</button>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Activity</label>
      <div class="activity-picker" id="activity-picker"></div>
    </div>

    <div class="field">
      <label class="field-label">Energy Before</label>
      <div class="energy-dots" id="dots-before"></div>
    </div>

    <div class="field">
      <label class="field-label">Energy After</label>
      <div class="energy-dots" id="dots-after"></div>
    </div>

    <div class="field">
      <label class="field-label">Note <span class="optional">(optional)</span></label>
      <textarea id="note-input" rows="2" placeholder="What felt good or draining about this?"></textarea>
    </div>

    <button class="submit-btn" id="submit-btn">Log Entry</button>
  </div>

</div>

<script>
  // ─── Data ───────────────────────────────────────────────────────────────────

  const ENERGY = [
    { v: 1, label: 'Drained',   color: '#c0392b' },
    { v: 2, label: 'Low',       color: '#e67e22' },
    { v: 3, label: 'Neutral',   color: '#f1c40f' },
    { v: 4, label: 'Energised', color: '#2ecc71' },
    { v: 5, label: 'Alive',     color: '#1abc9c' },
  ];

  const ACTIVITIES = [
    'Deep work / analysis', 'Meeting', 'Presenting', 'Mentoring / teaching',
    'Admin / email', 'Creative thinking', 'Collaboration', 'Strategy / planning',
    'Client interaction', 'One-to-one conversation', 'Other'
  ];

  let selectedActivity = ACTIVITIES[0];
  const TODAY_LABEL = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

  let entries = [];
  let selectedTime = 'Morning';
  let selectedBefore = null;
  let selectedAfter = null;
  let viewDate = new Date(); // the day currently being viewed

  try { entries = JSON.parse(localStorage.getItem('energy-diary') || '[]'); } catch {}

  // ─── Utilities ──────────────────────────────────────────────────────────────

  function save() { localStorage.setItem('energy-diary', JSON.stringify(entries)); }

  function dateKey(d) { return d.toDateString(); }
  function dateLabel(d) { return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' }); }
  function isToday(d) { return dateKey(d) === TODAY_KEY; }

  function viewEntries() { return entries.filter(e => e.dateKey === dateKey(viewDate)); }
  function todayEntries() { return entries.filter(e => e.dateKey === TODAY_KEY); }

  // Get all unique days that have entries, sorted newest first
  function daysWithEntries() {
    const keys = [...new Set(entries.map(e => e.dateKey))];
    return keys.map(k => new Date(k)).sort((a, b) => b - a);
  }

  // Step viewDate to prev/next day that has entries (or today for next)
  function stepDay(dir) {
    const days = daysWithEntries();
    // Always include today even if no entries
    if (!days.find(d => dateKey(d) === TODAY_KEY)) days.unshift(new Date());
    days.sort((a, b) => b - a);

    const cur = dateKey(viewDate);
    const idx = days.findIndex(d => dateKey(d) === cur);

    if (dir === -1 && idx < days.length - 1) { viewDate = days[idx + 1]; }
    else if (dir === 1 && idx > 0) { viewDate = days[idx - 1]; }
    renderAll();
  }

  function el(id) { return document.getElementById(id); }
  function energyInfo(v) { return ENERGY.find(e => e.v === v); }

  function renderActivityPicker() {
    const picker = el('activity-picker');
    picker.innerHTML = ACTIVITIES.map(a => `
      <button class="activity-pill ${a === selectedActivity ? 'selected' : ''}"
        onclick="selectActivity('${a.replace(/'/g, "\\'")}')">${a}</button>
    `).join('');
  }

  window.selectActivity = function(a) {
    selectedActivity = a;
    renderActivityPicker();
  };

  function renderHeader() {
    el('date-heading').textContent = dateLabel(viewDate);
    const todayViewing = isToday(viewDate);
    el('today-badge').style.display = todayViewing ? 'inline-block' : 'none';

    const count = viewEntries().length;
    el('subtitle').textContent = count === 0
      ? (todayViewing ? 'Log your first entry for today' : 'No entries for this day')
      : `${count} entr${count === 1 ? 'y' : 'ies'} logged`;

    // Nav buttons
    const days = daysWithEntries();
    if (!days.find(d => dateKey(d) === TODAY_KEY)) days.unshift(new Date());
    days.sort((a, b) => b - a);
    const idx = days.findIndex(d => dateKey(d) === dateKey(viewDate));
    el('nav-prev').disabled = idx >= days.length - 1;
    el('nav-next').disabled = idx <= 0;
  }

  function renderInsights() {
    const panel = el('insights-panel');
    const te = viewEntries();
    if (te.length < 2) { panel.innerHTML = ''; return; }

    const avg = (te.reduce((s, e) => s + e.after, 0) / te.length).toFixed(1);
    const givers = te.filter(e => e.after > e.before).sort((a, b) => (b.after - b.before) - (a.after - a.before));
    const drainers = te.filter(e => e.after < e.before).sort((a, b) => (a.after - a.before) - (b.after - b.before));
    const giver = givers[0];
    const drainer = drainers[0];

    panel.innerHTML = `
      <div class="insights">
        <div class="insights-title">Today's Patterns</div>
        <div class="insights-grid">
          <div class="insight-item">
            <div class="insight-label">Avg Energy After</div>
            <div class="insight-value">${avg}<span>/5</span></div>
          </div>
          ${giver ? `
          <div class="insight-item">
            <div class="insight-label green">↑ Energy Giver</div>
            <div class="insight-value-sm">${giver.activity}</div>
          </div>` : ''}
          ${drainer ? `
          <div class="insight-item">
            <div class="insight-label red">↓ Energy Drainer</div>
            <div class="insight-value-sm">${drainer.activity}</div>
          </div>` : ''}
        </div>
      </div>`;
  }

  function renderEntries() {
    const list = el('entries-list');
    const te = viewEntries();
    const isPast = !isToday(viewDate);
    if (te.length === 0) {
      list.innerHTML = `<div class="empty-state">${isPast ? 'No entries were logged<br>on this day.' : 'Nothing logged yet —<br>your energy story starts now.'}</div>`;
      return;
    }
    list.innerHTML = te.map(e => {
      const b = energyInfo(e.before);
      const a = energyInfo(e.after);
      const delta = e.after - e.before;
      const deltaStr = delta > 0 ? `+${delta}` : delta === 0 ? '±0' : `${delta}`;
      const deltaColor = delta > 0 ? '#2ecc71' : delta < 0 ? '#e74c3c' : 'rgba(255,255,255,0.3)';
      return `
        <div class="entry-card">
          <div class="entry-header">
            <div>
              <span class="entry-activity">${e.activity}</span>
              <span class="entry-time-badge">${e.time}</span>
            </div>
            <button class="delete-btn" onclick="deleteEntry(${e.id})" title="Delete entry">×</button>
          </div>
          <div class="energy-row">
            <span class="energy-pill" style="color:${b.color};background:${b.color}22">${b.label}</span>
            <span class="arrow">→</span>
            <span class="energy-pill" style="color:${a.color};background:${a.color}22">${a.label}</span>
            <span class="delta" style="color:${deltaColor}">${deltaStr}</span>
          </div>
          ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
        </div>`;
    }).join('');
  }

  function renderDots(containerId, selectedVal, onSelect) {
    const container = el(containerId);
    container.innerHTML = ENERGY.map(lv => `
      <div class="dot-wrap">
        <button class="energy-dot ${selectedVal === lv.v ? 'selected' : ''}"
          data-v="${lv.v}"
          style="
            background: ${selectedVal === lv.v ? lv.color : lv.color + '33'};
            border-color: ${selectedVal === lv.v ? lv.color : 'transparent'};
            box-shadow: ${selectedVal === lv.v ? `0 0 12px ${lv.color}88` : 'none'};
            transform: ${selectedVal === lv.v ? 'scale(1.18)' : 'scale(1)'};
          "
          onclick="${onSelect}(${lv.v})">
        </button>
        <div class="dot-label">${lv.label}</div>
      </div>`).join('');
  }

  function renderAll() {
    renderHeader();
    renderInsights();
    renderEntries();
    renderPatterns();
    renderDataActions();
    renderTabs();
    renderActivityPicker();
    renderDots('dots-before', selectedBefore, 'setBefore');
    renderDots('dots-after', selectedAfter, 'setAfter');
    updateSubmit();
  }

  function updateSubmit() {
    const btn = el('submit-btn');
    const ready = selectedBefore !== null && selectedAfter !== null;
    btn.classList.toggle('ready', ready);
    btn.classList.remove('saved');
    btn.textContent = 'Log Entry';
  }

  // ─── Actions ────────────────────────────────────────────────────────────────

  window.setBefore = function(v) {
    selectedBefore = v;
    renderDots('dots-before', selectedBefore, 'setBefore');
    updateSubmit();
  };

  window.setAfter = function(v) {
    selectedAfter = v;
    renderDots('dots-after', selectedAfter, 'setAfter');
    updateSubmit();
  };

  window.deleteEntry = function(id) {
    entries = entries.filter(e => e.id !== id);
    save();
    renderAll();
  };

  el('submit-btn').addEventListener('click', () => {
    if (selectedBefore === null || selectedAfter === null) return;
    const entry = {
      id: Date.now(),
      dateKey: TODAY_KEY,
      date: TODAY_LABEL,
      time: selectedTime,
      activity: selectedActivity,
      before: selectedBefore,
      after: selectedAfter,
      note: el('note-input').value.trim(),
    };
    entries.unshift(entry);
    save();

    const btn = el('submit-btn');
    btn.textContent = '✓ Saved';
    btn.classList.add('saved');

    setTimeout(() => {
      selectedBefore = null;
      selectedAfter = null;
      el('note-input').value = '';
      viewDate = new Date();
      switchTab('log');
      renderAll();
    }, 800);
  });

  // ─── Day Navigation ──────────────────────────────────────────────────────────

  el('nav-prev').addEventListener('click', () => stepDay(-1));
  el('nav-next').addEventListener('click', () => stepDay(1));

  // ─── Tabs ────────────────────────────────────────────────────────────────────

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + name));
  }

  function renderTabs() {
    const addTab = document.querySelector('.tab[data-tab="add"]');
    const viewing = isToday(viewDate);
    addTab.style.display = viewing ? '' : 'none';
    if (!viewing) {
      const currentTab = document.querySelector('.tab.active');
      if (currentTab && currentTab.dataset.tab === 'add') switchTab('log');
    }
  }

  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // ─── Time Segment ────────────────────────────────────────────────────────────

  document.querySelectorAll('[data-time]').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedTime = btn.dataset.time;
      document.querySelectorAll('[data-time]').forEach(b => b.classList.toggle('selected', b === btn));
    });
  });

  // ─── PWA Install ─────────────────────────────────────────────────────────────

  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    el('install-banner').classList.add('visible');
  });

  el('install-btn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    el('install-banner').classList.remove('visible');
  });

  el('install-close').addEventListener('click', () => {
    el('install-banner').classList.remove('visible');
  });

  // ─── Service Worker ──────────────────────────────────────────────────────────

  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'energy-diary-v1';
      const ASSETS = [self.location.pathname];
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ));
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request))
        );
      });
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swURL = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL).catch(() => {});
  }

  // ─── Patterns ────────────────────────────────────────────────────────────────

  let patternsScope = 7;

  function entriesInScope() {
    if (patternsScope === 'all') return entries;
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - patternsScope);
    cutoff.setHours(0, 0, 0, 0);
    return entries.filter(e => new Date(e.id) >= cutoff);
  }

  function renderPatterns() {
    const scoped = entriesInScope();
    const summaryEl = el('patterns-summary');
    const listEl = el('patterns-list');

    if (scoped.length === 0) {
      summaryEl.innerHTML = '';
      listEl.innerHTML = `<div class="patterns-empty">Not enough data yet —<br>keep logging for a few days.</div>`;
      return;
    }

    // Group by activity
    const grouped = {};
    scoped.forEach(e => {
      if (!grouped[e.activity]) grouped[e.activity] = [];
      grouped[e.activity].push(e);
    });

    // Build stats per activity
    const stats = Object.entries(grouped).map(([name, es]) => {
      const avgDelta = es.reduce((s, e) => s + (e.after - e.before), 0) / es.length;
      const avgAfter = es.reduce((s, e) => s + e.after, 0) / es.length;
      return { name, count: es.length, avgDelta, avgAfter };
    }).sort((a, b) => b.avgDelta - a.avgDelta);

    // Overall summary stats
    const totalDays = new Set(scoped.map(e => e.dateKey)).size;
    const overallAvgAfter = (scoped.reduce((s, e) => s + e.after, 0) / scoped.length).toFixed(1);
    const topGiver = stats[0];
    const topDrainer = stats[stats.length - 1];

    summaryEl.innerHTML = `
      <div class="patterns-summary">
        <div class="summary-stat">
          <span class="summary-stat-value">${scoped.length}</span>
          <span class="summary-stat-label">Entries</span>
        </div>
        <div class="summary-stat">
          <span class="summary-stat-value">${totalDays}</span>
          <span class="summary-stat-label">Days</span>
        </div>
        <div class="summary-stat">
          <span class="summary-stat-value">${overallAvgAfter}<span style="font-size:12px;color:rgba(255,255,255,0.3)">/5</span></span>
          <span class="summary-stat-label">Avg Energy</span>
        </div>
      </div>`;

    // Max absolute delta for bar scaling
    const maxAbs = Math.max(...stats.map(s => Math.abs(s.avgDelta)), 1);

    listEl.innerHTML = stats.map(s => {
      const isPositive = s.avgDelta >= 0;
      const color = s.avgDelta > 0.3 ? '#2ecc71'
                  : s.avgDelta < -0.3 ? '#e74c3c'
                  : '#f1c40f';
      const barWidth = Math.round((Math.abs(s.avgDelta) / maxAbs) * 100);
      const deltaStr = s.avgDelta > 0 ? `+${s.avgDelta.toFixed(1)}` : s.avgDelta.toFixed(1);

      return `
        <div class="pattern-card">
          <div class="pattern-top">
            <span class="pattern-name">${s.name}</span>
            <span class="pattern-avg" style="color:${color}">${deltaStr}</span>
          </div>
          <div class="pattern-bar-wrap">
            <div class="pattern-bar" style="width:${barWidth}%;background:${color}"></div>
          </div>
          <div class="pattern-meta">
            <span class="pattern-meta-item">Logged <span>${s.count}×</span></span>
            <span class="pattern-meta-item">Avg after <span>${s.avgAfter.toFixed(1)}/5</span></span>
            <span class="pattern-meta-item" style="color:${color}">${s.avgDelta > 0.3 ? '↑ Giver' : s.avgDelta < -0.3 ? '↓ Drainer' : '→ Neutral'}</span>
          </div>
        </div>`;
    }).join('');
  }

  document.querySelectorAll('.scope-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      patternsScope = btn.dataset.scope === 'all' ? 'all' : parseInt(btn.dataset.scope);
      document.querySelectorAll('.scope-btn').forEach(b => b.classList.toggle('active', b === btn));
      renderPatterns();
    });
  });

  // ─── Export / Import ─────────────────────────────────────────────────────────

  function renderDataActions() {
    const actionsEl = el('data-actions');
    actionsEl.style.display = 'flex';
    const exportBtn = el('export-btn');
    const hasEntries = entries.length > 0;
    exportBtn.disabled = !hasEntries;
    exportBtn.style.opacity = hasEntries ? '1' : '0.3';
    exportBtn.style.cursor = hasEntries ? 'pointer' : 'not-allowed';
  }

  // Export
  el('export-btn').addEventListener('click', () => {
    const payload = { version: 1, exported: new Date().toISOString(), entries };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `energy-diary-${dateStr}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  // Import — trigger file picker
  let pendingImport = null;

  el('import-trigger-btn').addEventListener('click', () => {
    el('file-input').value = '';
    el('file-input').click();
  });

  el('file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const incoming = Array.isArray(parsed) ? parsed : (parsed.entries || []);
        if (!incoming.length) { alert('No entries found in that file.'); return; }

        // Deduplicate preview
        const existingIds = new Set(entries.map(e => e.id));
        const newOnes = incoming.filter(e => !existingIds.has(e.id));
        const dupes = incoming.length - newOnes.length;

        pendingImport = newOnes;
        const msg = el('import-confirm-msg');
        msg.innerHTML = `Found <strong>${incoming.length}</strong> entr${incoming.length === 1 ? 'y' : 'ies'} in file.`
          + (dupes > 0 ? ` <strong>${dupes}</strong> already exist and will be skipped.` : '')
          + ` <strong>${newOnes.length}</strong> new entr${newOnes.length === 1 ? 'y' : 'ies'} will be added.`;
        el('import-confirm').classList.add('visible');
      } catch {
        alert('Could not read that file — make sure it\'s a valid Energy Diary JSON export.');
      }
    };
    reader.readAsText(file);
  });

  el('confirm-yes-btn').addEventListener('click', () => {
    if (!pendingImport) return;
    entries = [...entries, ...pendingImport].sort((a, b) => b.id - a.id);
    save();
    pendingImport = null;
    el('import-confirm').classList.remove('visible');
    renderAll();
  });

  el('confirm-no-btn').addEventListener('click', () => {
    pendingImport = null;
    el('import-confirm').classList.remove('visible');
  });

  // ─── Init ────────────────────────────────────────────────────────────────────
  renderAll();
</script>
</body>
</html>
