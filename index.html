<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0d1210"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Energy Diary"/>
  <meta name="description" content="Track your energy through the working day"/>
  <title>Energy Diary</title>

  <script>

    document.write('<link rel="manifest" href="'+URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}))+'">');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --text:  #e8e0d0;
      --muted: rgba(255,255,255,0.3);
      --subtle:rgba(255,255,255,0.08);
      --green: #a3c4a0;
      --serif: 'Playfair Display', Georgia, serif;
      --body:  'Lora', Georgia, serif;
      --mono:  'DM Mono', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      color: var(--text);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      background: linear-gradient(135deg, #0d0d10 0%, #12111a 50%, #0d1210 100%);
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    #app {
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 20px 80px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    @keyframes pop    { 0% { transform:scale(1); } 50% { transform:scale(1.22); } 100% { transform:scale(1.18); } }

    /* ── HEADER ── */
    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 28px;
    }

    /* ── DAY NAVIGATOR ── */
    .day-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .nav-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 16px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .nav-btn:hover:not(:disabled) { border-color: var(--green); color: var(--green); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    .nav-date { flex: 1; text-align: center; }
    .nav-date-label {
      font-family: var(--serif);
      font-size: clamp(15px, 4vw, 18px);
      color: var(--text);
      display: block;
      line-height: 1.2;
    }
    .nav-today-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--green);
      margin-top: 3px;
      display: none;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--subtle);
      margin-bottom: 28px;
    }
    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 20px 10px;
      transition: all 0.2s;
      margin-bottom: -1px;
    }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── INSTALL BANNER ── */
    .install-banner {
      display: none;
      background: rgba(163,196,160,0.1);
      border: 1px solid rgba(163,196,160,0.25);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 24px;
      align-items: center;
      gap: 12px;
    }
    .install-banner.visible { display: flex; }
    .install-text { flex: 1; font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.4; }
    .install-text strong { color: var(--green); }
    .install-btn {
      background: var(--green); color: #0d1210; border: none; border-radius: 8px;
      padding: 8px 14px; font-family: var(--mono); font-size: 10px;
      letter-spacing: 1px; text-transform: uppercase; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .install-close {
      background: none; border: none; color: rgba(255,255,255,0.25);
      cursor: pointer; font-size: 18px; flex-shrink: 0;
    }

    /* ── INSIGHTS (log view summary bar) ── */
    .insights {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--subtle);
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 24px;
    }
    .insights-title {
      font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.4);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; font-weight: 400;
    }
    .insights-grid { display: flex; gap: 12px; flex-wrap: wrap; }
    .insight-item { flex: 1; min-width: 100px; }
    .insight-item + .insight-item { border-left: 1px solid rgba(255,255,255,0.07); padding-left: 16px; }
    .insight-label { font-size: 10px; color: rgba(255,255,255,0.3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .insight-label.green { color: #2ecc71; }
    .insight-label.red   { color: #e74c3c; }
    .insight-value    { font-family: var(--serif); font-size: 26px; color: var(--text); }
    .insight-value span { font-size: 13px; color: rgba(255,255,255,0.3); }
    .insight-value-sm { font-family: var(--serif); font-size: 14px; color: var(--text); }

    /* ── ENTRY CARDS ── */
    .entry-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 10px;
      animation: fadeIn 0.3s ease;
    }
    .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .entry-activity { font-family: var(--serif); font-size: 15px; color: var(--text); font-weight: 600; }
    .entry-time-badge { font-size: 10px; color: rgba(255,255,255,0.3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; margin-left: 8px; }
    .delete-btn { background: none; border: none; color: rgba(255,255,255,0.18); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 4px; transition: color 0.2s; flex-shrink: 0; }
    .delete-btn:hover { color: #e74c3c; }
    .energy-row { display: flex; align-items: center; gap: 10px; }
    .energy-pill { font-size: 11px; font-family: var(--mono); padding: 3px 9px; border-radius: 6px; }
    .arrow { color: rgba(255,255,255,0.2); font-size: 13px; }
    .delta { margin-left: auto; font-size: 13px; font-family: var(--mono); }
    .entry-note { margin-top: 10px; font-size: 13px; color: rgba(255,255,255,0.42); font-style: italic; line-height: 1.6; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 10px; }
    .empty-state { text-align: center; padding: 56px 0; color: rgba(255,255,255,0.18); font-style: italic; font-size: 15px; line-height: 1.8; }

    /* ── DATA ACTIONS (export/import) ── */
    .data-actions { display: flex; gap: 8px; margin-top: 20px; }
    .data-btn {
      flex: 1; padding: 10px 8px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09); border-radius: 10px;
      color: rgba(255,255,255,0.45); cursor: pointer; font-family: var(--mono);
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      transition: all 0.2s; text-align: center;
    }
    .data-btn:hover:not(:disabled) { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
    .data-btn.export:hover:not(:disabled) { border-color: var(--green); color: var(--green); }
    .data-btn .btn-icon { display: block; font-size: 16px; margin-bottom: 4px; }

    .import-confirm {
      display: none;
      background: rgba(127,179,211,0.08);
      border: 1px solid rgba(127,179,211,0.25);
      border-radius: 12px;
      padding: 16px 18px;
      margin-top: 12px;
    }
    .import-confirm.visible { display: block; }
    .import-confirm p { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 12px; font-style: italic; }
    .import-confirm-btns { display: flex; gap: 8px; }
    .confirm-yes { flex:1; padding:9px; background:#7fb3d3; border:none; border-radius:8px; color:#0d1210; font-family:var(--mono); font-size:10px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
    .confirm-no  { flex:1; padding:9px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:rgba(255,255,255,0.4); font-family:var(--mono); font-size:10px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }

    /* ── PATTERNS VIEW ── */
    .patterns-scope { display: flex; gap: 6px; margin-bottom: 20px; }
    .scope-btn {
      padding: 6px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; color: rgba(255,255,255,0.35); cursor: pointer; font-family: var(--mono);
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.18s;
    }
    .scope-btn.active { background: rgba(163,196,160,0.12); border-color: var(--green); color: var(--green); }

    .patterns-summary { display: flex; background: rgba(255,255,255,0.03); border: 1px solid var(--subtle); border-radius: 14px; padding: 18px 20px; margin-bottom: 20px; }
    .summary-stat { flex: 1; text-align: center; }
    .summary-stat + .summary-stat { border-left: 1px solid rgba(255,255,255,0.07); }
    .summary-stat-value { font-family: var(--serif); font-size: 22px; color: var(--text); display: block; margin-bottom: 3px; }
    .summary-stat-label { font-family: var(--mono); font-size: 9px; color: rgba(255,255,255,0.28); text-transform: uppercase; letter-spacing: 1px; }

    .pattern-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; }
    .pattern-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .pattern-name { font-family: var(--serif); font-size: 15px; color: var(--text); font-weight: 600; }
    .pattern-avg  { font-family: var(--mono); font-size: 18px; flex-shrink: 0; }
    .pattern-bar-wrap { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
    .pattern-bar  { height: 100%; border-radius: 3px; }
    .pattern-meta { display: flex; gap: 16px; flex-wrap: wrap; }
    .pattern-meta-item { font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.3); }
    .pattern-meta-item span { color: rgba(255,255,255,0.55); }
    .patterns-empty { text-align: center; padding: 56px 0; color: rgba(255,255,255,0.18); font-style: italic; font-size: 15px; line-height: 1.8; }

    /* ── ADD FORM ── */
    .field { margin-bottom: 24px; }
    .field-label { display: block; font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
    .field-label .optional { color: rgba(255,255,255,0.18); }

    .btn-group { display: flex; gap: 8px; }
    .seg-btn {
      flex: 1; padding: 10px 4px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: rgba(255,255,255,0.4); cursor: pointer; font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.5px; transition: all 0.2s; text-align: center;
    }
    .seg-btn.selected { background: rgba(163,196,160,0.15); border-color: var(--green); color: var(--green); }

    .activity-picker { display: flex; flex-wrap: wrap; gap: 7px; }
    .activity-pill {
      padding: 7px 13px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px; color: rgba(255,255,255,0.45); cursor: pointer; font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.5px; transition: all 0.18s; white-space: nowrap;
    }
    .activity-pill.selected { background: rgba(163,196,160,0.15); border-color: var(--green); color: var(--green); }

    .energy-dots { display: flex; gap: 8px; align-items: center; }
    .dot-wrap { text-align: center; }
    .energy-dot {
      width: 38px; height: 38px; border-radius: 50%; border: 2px solid transparent;
      cursor: pointer; transition: all 0.2s ease; display: block; margin: 0 auto 5px;
    }
    .energy-dot.selected { animation: pop 0.2s ease forwards; }
    .dot-label { font-size: 8px; color: rgba(255,255,255,0.22); font-family: var(--mono); }

    /* contenteditable note field — no native widget, no bleed */
    .note-field {
      width: 100%; min-height: 52px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      padding: 13px 14px;
      color: var(--text);
      font-family: var(--body);
      font-style: italic;
      font-size: 14px;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.2s;
      word-break: break-word;
    }
    .note-field:focus { border-color: rgba(163,196,160,0.35); }
    .note-field:empty::before { content: attr(data-placeholder); color: rgba(255,255,255,0.2); pointer-events: none; }

    .submit-btn {
      width: 100%; padding: 15px; background: rgba(255,255,255,0.06); border: none;
      border-radius: 12px; color: rgba(255,255,255,0.2); font-family: var(--mono);
      font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      cursor: not-allowed; transition: all 0.25s ease; font-weight: 500;
    }
    .submit-btn.ready { background: var(--green); color: #0d1210; cursor: pointer; }
    .submit-btn.ready:hover { filter: brightness(1.1); }
    .submit-btn.saved { background: #2ecc71; color: #fff; }
  </style>
</head>
<body>
<div id="app">

  <div class="eyebrow">Energy Diary</div>

  <div class="day-nav">
    <button class="nav-btn" id="nav-prev">&#8592;</button>
    <div class="nav-date">
      <span class="nav-date-label" id="date-heading"></span>
      <span class="nav-today-badge" id="today-badge">Today</span>
    </div>
    <button class="nav-btn" id="nav-next" disabled>&#8594;</button>
  </div>

  <p class="subtitle" id="subtitle"></p>

  <div class="install-banner" id="install-banner">
    <div class="install-text"><strong>Add to Home Screen</strong><br>Install for quick daily access</div>
    <button class="install-btn" id="install-btn">Install</button>
    <button class="install-close" id="install-close">&#215;</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="log">Log</button>
    <button class="tab" data-tab="patterns">Patterns</button>
    <button class="tab" data-tab="add">+ New Entry</button>
  </div>

  <!-- LOG VIEW -->
  <div class="view active" id="view-log">
    <div id="insights-panel"></div>
    <div id="entries-list"></div>
    <div class="data-actions">
      <button class="data-btn export" id="export-btn"><span class="btn-icon">&#8595;</span>Export JSON</button>
      <button class="data-btn" id="import-btn"><span class="btn-icon">&#8593;</span>Import JSON</button>
    </div>
    <div class="import-confirm" id="import-confirm">
      <p id="import-msg"></p>
      <div class="import-confirm-btns">
        <button class="confirm-yes" id="confirm-yes">Merge &amp; Import</button>
        <button class="confirm-no"  id="confirm-no">Cancel</button>
      </div>
    </div>
  </div>

  <!-- PATTERNS VIEW -->
  <div class="view" id="view-patterns">
    <div class="patterns-scope">
      <button class="scope-btn active" data-scope="7">7 days</button>
      <button class="scope-btn" data-scope="30">30 days</button>
      <button class="scope-btn" data-scope="all">All time</button>
    </div>
    <div id="patterns-summary"></div>
    <div id="patterns-list"></div>
  </div>

  <!-- ADD VIEW — contains zero native form elements -->
  <div class="view" id="view-add">
    <div class="field">
      <label class="field-label">Time of Day</label>
      <div class="btn-group">
        <button class="seg-btn selected" data-time="Morning">Morning</button>
        <button class="seg-btn" data-time="After Lunch">After Lunch</button>
        <button class="seg-btn" data-time="End of Day">End of Day</button>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Activity</label>
      <div class="activity-picker" id="activity-picker"></div>
    </div>
    <div class="field">
      <label class="field-label">Energy Before</label>
      <div class="energy-dots" id="dots-before"></div>
    </div>
    <div class="field">
      <label class="field-label">Energy After</label>
      <div class="energy-dots" id="dots-after"></div>
    </div>
    <div class="field">
      <label class="field-label">Note <span class="optional">(optional)</span></label>
      <div class="note-field" id="note-field" contenteditable="true" data-placeholder="What felt good or draining about this?"></div>
    </div>
    <button class="submit-btn" id="submit-btn">Log Entry</button>
  </div>

</div>
<script>
  // ── Constants ────────────────────────────────────────────────────────────────

  var ENERGY = [
    { v:1, label:'Drained',   color:'#c0392b' },
    { v:2, label:'Low',       color:'#e67e22' },
    { v:3, label:'Neutral',   color:'#f1c40f' },
    { v:4, label:'Energised', color:'#2ecc71' },
    { v:5, label:'Alive',     color:'#1abc9c' },
  ];

  var ACTIVITIES = [
    'Deep work / analysis','Meeting','Presenting','Mentoring / teaching',
    'Admin / email','Creative thinking','Collaboration','Strategy / planning',
    'Client interaction','One-to-one conversation','Other'
  ];

  var TODAY_KEY   = new Date().toDateString();
  var TODAY_LABEL = fmt(new Date());

  // ── State ────────────────────────────────────────────────────────────────────

  var entries          = [];
  var viewDate         = new Date();
  var selectedTime     = 'Morning';
  var selectedBefore   = null;
  var selectedAfter    = null;
  var selectedActivity = ACTIVITIES[0];
  var patternsScope    = 7;
  var pendingImport    = null;
  var deferredPrompt   = null;

  try { entries = JSON.parse(localStorage.getItem('energy-diary') || '[]'); } catch(e) {}

  // ── Utilities ────────────────────────────────────────────────────────────────

  function el(id)       { return document.getElementById(id); }
  function save()       { localStorage.setItem('energy-diary', JSON.stringify(entries)); }
  function key(d)       { return d.toDateString(); }
  function fmt(d)       { return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' }); }
  function isToday(d)   { return key(d) === TODAY_KEY; }
  function eInfo(v)     { return ENERGY.find(function(e){ return e.v===v; }); }
  function viewEntries(){ return entries.filter(function(e){ return e.dateKey===key(viewDate); }); }

  function daysWithEntries() {
    var seen = {};
    entries.forEach(function(e){ seen[e.dateKey]=true; });
    return Object.keys(seen).map(function(k){ return new Date(k); }).sort(function(a,b){ return b-a; });
  }

  function stepDay(dir) {
    var days = daysWithEntries();
    if (!days.find(function(d){ return key(d)===TODAY_KEY; })) days.unshift(new Date());
    days.sort(function(a,b){ return b-a; });
    var idx = days.findIndex(function(d){ return key(d)===key(viewDate); });
    if (dir===-1 && idx < days.length-1) viewDate = days[idx+1];
    else if (dir===1 && idx > 0)         viewDate = days[idx-1];
    renderAll();
  }

  // ── Render ───────────────────────────────────────────────────────────────────

  function renderHeader() {
    el('date-heading').textContent = fmt(viewDate);
    el('today-badge').style.display = isToday(viewDate) ? 'inline-block' : 'none';
    var count = viewEntries().length;
    el('subtitle').textContent = count === 0
      ? (isToday(viewDate) ? 'Log your first entry for today' : 'No entries for this day')
      : count + ' entr' + (count===1?'y':'ies') + ' logged';
    var days = daysWithEntries();
    if (!days.find(function(d){ return key(d)===TODAY_KEY; })) days.unshift(new Date());
    days.sort(function(a,b){ return b-a; });
    var idx = days.findIndex(function(d){ return key(d)===key(viewDate); });
    el('nav-prev').disabled = idx >= days.length-1;
    el('nav-next').disabled = idx <= 0;
  }

  function renderTabs() {
    var addTab = document.querySelector('.tab[data-tab="add"]');
    var viewing = isToday(viewDate);
    addTab.style.display = viewing ? '' : 'none';
    if (!viewing) {
      var cur = document.querySelector('.tab.active');
      if (cur && cur.dataset.tab === 'add') switchTab('log');
    }
  }

  function renderInsights() {
    var panel = el('insights-panel');
    var te = viewEntries();
    if (te.length < 2) { panel.innerHTML = ''; return; }
    var avg = (te.reduce(function(s,e){ return s+e.after; },0)/te.length).toFixed(1);
    var givers   = te.filter(function(e){ return e.after>e.before; }).sort(function(a,b){ return (b.after-b.before)-(a.after-a.before); });
    var drainers = te.filter(function(e){ return e.after<e.before; }).sort(function(a,b){ return (a.after-a.before)-(b.after-b.before); });
    var h = '<div class="insights"><div class="insights-title">Today\'s Patterns</div><div class="insights-grid">';
    h += '<div class="insight-item"><div class="insight-label">Avg Energy After</div><div class="insight-value">'+avg+'<span>/5</span></div></div>';
    if (givers[0])   h += '<div class="insight-item"><div class="insight-label green">&#8593; Energy Giver</div><div class="insight-value-sm">'+givers[0].activity+'</div></div>';
    if (drainers[0]) h += '<div class="insight-item"><div class="insight-label red">&#8595; Energy Drainer</div><div class="insight-value-sm">'+drainers[0].activity+'</div></div>';
    h += '</div></div>';
    panel.innerHTML = h;
  }

  function renderEntries() {
    var list = el('entries-list');
    var te = viewEntries();
    if (te.length === 0) {
      list.innerHTML = '<div class="empty-state">'+(isToday(viewDate)?'Nothing logged yet —<br>your energy story starts now.':'No entries were logged<br>on this day.')+'</div>';
      return;
    }
    list.innerHTML = te.map(function(e) {
      var b = eInfo(e.before), a = eInfo(e.after), d = e.after-e.before;
      var ds = d>0?'+'+d:d===0?'±0':''+d;
      var dc = d>0?'#2ecc71':d<0?'#e74c3c':'rgba(255,255,255,0.3)';
      return '<div class="entry-card">'
        +'<div class="entry-header"><div>'
        +'<span class="entry-activity">'+e.activity+'</span>'
        +'<span class="entry-time-badge">'+e.time+'</span>'
        +'</div><button class="delete-btn" data-id="'+e.id+'">&times;</button></div>'
        +'<div class="energy-row">'
        +'<span class="energy-pill" style="color:'+b.color+';background:'+b.color+'22">'+b.label+'</span>'
        +'<span class="arrow">&#8594;</span>'
        +'<span class="energy-pill" style="color:'+a.color+';background:'+a.color+'22">'+a.label+'</span>'
        +'<span class="delta" style="color:'+dc+'">'+ds+'</span>'
        +'</div>'
        +(e.note?'<div class="entry-note">'+e.note+'</div>':'')
        +'</div>';
    }).join('');
  }

  function renderDots(cid, val) {
    el(cid).innerHTML = ENERGY.map(function(lv) {
      var s = val===lv.v;
      return '<div class="dot-wrap">'
        +'<button class="energy-dot'+(s?' selected':'')+'" data-dotid="'+cid+'" data-v="'+lv.v+'"'
        +' style="background:'+(s?lv.color:lv.color+'33')+';border-color:'+(s?lv.color:'transparent')+';box-shadow:'+(s?'0 0 12px '+lv.color+'88':'none')+';transform:'+(s?'scale(1.18)':'scale(1)')+';">'
        +'</button><div class="dot-label">'+lv.label+'</div></div>';
    }).join('');
  }

  function renderActivityPicker() {
    el('activity-picker').innerHTML = ACTIVITIES.map(function(a) {
      return '<button class="activity-pill'+(a===selectedActivity?' selected':'')+'" data-activity="'+a+'">'+a+'</button>';
    }).join('');
  }

  function renderDataActions() {
    var has = entries.length > 0;
    el('export-btn').disabled = !has;
    el('export-btn').style.opacity = has ? '1' : '0.3';
    el('export-btn').style.cursor  = has ? 'pointer' : 'not-allowed';
  }

  function renderPatterns() {
    var scoped;
    if (patternsScope === 'all') {
      scoped = entries.slice();
    } else {
      var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-patternsScope); cutoff.setHours(0,0,0,0);
      scoped = entries.filter(function(e){ return new Date(e.id)>=cutoff; });
    }
    var sEl = el('patterns-summary'), lEl = el('patterns-list');
    if (!scoped.length) {
      sEl.innerHTML = '';
      lEl.innerHTML = '<div class="patterns-empty">Not enough data yet —<br>keep logging for a few days.</div>';
      return;
    }
    var grouped = {};
    scoped.forEach(function(e){ if(!grouped[e.activity]) grouped[e.activity]=[]; grouped[e.activity].push(e); });
    var stats = Object.keys(grouped).map(function(name) {
      var es = grouped[name];
      return { name:name, count:es.length,
        avgDelta: es.reduce(function(s,e){ return s+(e.after-e.before); },0)/es.length,
        avgAfter: es.reduce(function(s,e){ return s+e.after; },0)/es.length };
    }).sort(function(a,b){ return b.avgDelta-a.avgDelta; });
    var days = new Set(scoped.map(function(e){ return e.dateKey; })).size;
    var avg  = (scoped.reduce(function(s,e){ return s+e.after; },0)/scoped.length).toFixed(1);
    sEl.innerHTML = '<div class="patterns-summary">'
      +'<div class="summary-stat"><span class="summary-stat-value">'+scoped.length+'</span><span class="summary-stat-label">Entries</span></div>'
      +'<div class="summary-stat"><span class="summary-stat-value">'+days+'</span><span class="summary-stat-label">Days</span></div>'
      +'<div class="summary-stat"><span class="summary-stat-value">'+avg+'<span style="font-size:12px;color:rgba(255,255,255,0.3)">/5</span></span><span class="summary-stat-label">Avg Energy</span></div>'
      +'</div>';
    var maxAbs = Math.max.apply(null, stats.map(function(s){ return Math.abs(s.avgDelta); }).concat([1]));
    lEl.innerHTML = stats.map(function(s) {
      var c = s.avgDelta>0.3?'#2ecc71':s.avgDelta<-0.3?'#e74c3c':'#f1c40f';
      var w = Math.round(Math.abs(s.avgDelta)/maxAbs*100);
      var ds = (s.avgDelta>0?'+':'')+s.avgDelta.toFixed(1);
      var tag = s.avgDelta>0.3?'&#8593; Giver':s.avgDelta<-0.3?'&#8595; Drainer':'&#8594; Neutral';
      return '<div class="pattern-card">'
        +'<div class="pattern-top"><span class="pattern-name">'+s.name+'</span><span class="pattern-avg" style="color:'+c+'">'+ds+'</span></div>'
        +'<div class="pattern-bar-wrap"><div class="pattern-bar" style="width:'+w+'%;background:'+c+'"></div></div>'
        +'<div class="pattern-meta">'
        +'<span class="pattern-meta-item">Logged <span>'+s.count+'&times;</span></span>'
        +'<span class="pattern-meta-item">Avg after <span>'+s.avgAfter.toFixed(1)+'/5</span></span>'
        +'<span class="pattern-meta-item" style="color:'+c+'">'+tag+'</span>'
        +'</div></div>';
    }).join('');
  }

  function updateSubmit() {
    var ready = selectedBefore!==null && selectedAfter!==null;
    el('submit-btn').classList.toggle('ready', ready);
    el('submit-btn').classList.remove('saved');
    el('submit-btn').textContent = 'Log Entry';
  }

  function renderAll() {
    renderHeader();
    renderTabs();
    renderInsights();
    renderEntries();
    renderDataActions();
    renderPatterns();
    renderActivityPicker();
    renderDots('dots-before', selectedBefore);
    renderDots('dots-after',  selectedAfter);
    updateSubmit();
  }

  // ── Tab switching ────────────────────────────────────────────────────────────

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab===name); });
    document.querySelectorAll('.view').forEach(function(v){ v.classList.toggle('active', v.id==='view-'+name); });
  }

  // ── Event delegation ─────────────────────────────────────────────────────────

  document.addEventListener('click', function(e) {
    var dot = e.target.closest('.energy-dot');
    if (dot) {
      var v = parseInt(dot.dataset.v);
      if (dot.dataset.dotid==='dots-before') { selectedBefore=v; renderDots('dots-before',v); }
      if (dot.dataset.dotid==='dots-after')  { selectedAfter=v;  renderDots('dots-after',v);  }
      updateSubmit(); return;
    }
    var pill = e.target.closest('.activity-pill');
    if (pill) { selectedActivity=pill.dataset.activity; renderActivityPicker(); return; }

    var del = e.target.closest('.delete-btn');
    if (del) {
      var id = parseInt(del.dataset.id);
      entries = entries.filter(function(e){ return e.id!==id; });
      save(); renderAll(); return;
    }
    var tab = e.target.closest('.tab');
    if (tab) { switchTab(tab.dataset.tab); return; }

    var scope = e.target.closest('.scope-btn');
    if (scope) {
      patternsScope = scope.dataset.scope==='all'?'all':parseInt(scope.dataset.scope);
      document.querySelectorAll('.scope-btn').forEach(function(b){ b.classList.toggle('active',b===scope); });
      renderPatterns(); return;
    }
    var seg = e.target.closest('.seg-btn');
    if (seg) {
      selectedTime = seg.dataset.time;
      document.querySelectorAll('.seg-btn').forEach(function(b){ b.classList.toggle('selected',b===seg); });
      return;
    }
  });

  // ── Form submit ──────────────────────────────────────────────────────────────

  el('submit-btn').addEventListener('click', function() {
    if (selectedBefore===null || selectedAfter===null) return;
    var note = el('note-field').textContent.trim();
    entries.unshift({ id:Date.now(), dateKey:TODAY_KEY, date:TODAY_LABEL,
      time:selectedTime, activity:selectedActivity, before:selectedBefore, after:selectedAfter, note:note });
    save();
    el('submit-btn').textContent = '✓ Saved';
    el('submit-btn').classList.add('saved');
    setTimeout(function() {
      selectedBefore=null; selectedAfter=null;
      el('note-field').textContent='';
      viewDate=new Date(); switchTab('log'); renderAll();
    }, 800);
  });

  // ── Navigation ───────────────────────────────────────────────────────────────

  el('nav-prev').addEventListener('click', function(){ stepDay(-1); });
  el('nav-next').addEventListener('click', function(){ stepDay(1); });

  // ── Export ───────────────────────────────────────────────────────────────────

  el('export-btn').addEventListener('click', function() {
    if (!entries.length) return;
    var blob = new Blob([JSON.stringify({version:1,exported:new Date().toISOString(),entries:entries},null,2)],{type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'energy-diary-'+new Date().toISOString().slice(0,10)+'.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // ── Import (file input created on the fly — never in the DOM at rest) ────────

  el('import-btn').addEventListener('click', function() {
    var input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.addEventListener('change', function() {
      var file = input.files[0]; if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          var parsed   = JSON.parse(ev.target.result);
          var incoming = Array.isArray(parsed) ? parsed : (parsed.entries||[]);
          if (!incoming.length) { alert('No entries found in that file.'); return; }
          var existing = new Set(entries.map(function(e){ return e.id; }));
          var newOnes  = incoming.filter(function(e){ return !existing.has(e.id); });
          var dupes    = incoming.length-newOnes.length;
          pendingImport = newOnes;
          var msg = 'Found '+incoming.length+' entr'+(incoming.length===1?'y':'ies')+' in file.';
          if (dupes) msg += ' '+dupes+' already exist and will be skipped.';
          msg += ' '+newOnes.length+' new entr'+(newOnes.length===1?'y':'ies')+' will be added.';
          el('import-msg').textContent = msg;
          el('import-confirm').classList.add('visible');
        } catch(err) { alert('Could not read that file — make sure it\'s a valid Energy Diary export.'); }
      };
      reader.readAsText(file);
    });
    input.click();
  });

  el('confirm-yes').addEventListener('click', function() {
    if (!pendingImport) return;
    entries = entries.concat(pendingImport).sort(function(a,b){ return b.id-a.id; });
    save(); pendingImport=null;
    el('import-confirm').classList.remove('visible');
    renderAll();
  });
  el('confirm-no').addEventListener('click', function() {
    pendingImport=null; el('import-confirm').classList.remove('visible');
  });

  // ── PWA install ──────────────────────────────────────────────────────────────

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault(); deferredPrompt=e;
    el('install-banner').classList.add('visible');
  });
  el('install-btn').addEventListener('click', function() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){ deferredPrompt=null; el('install-banner').classList.remove('visible'); });
  });
  el('install-close').addEventListener('click', function(){ el('install-banner').classList.remove('visible'); });

  // ── Service worker ───────────────────────────────────────────────────────────

  if ('serviceWorker' in navigator) {
    var sw = 'const C="energy-diary-v1";'
      +'self.addEventListener("install",e=>{e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.pathname])));self.skipWaiting();});'
      +'self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});'
      +'self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});';
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){});
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  renderAll();
</script>
</body>
</html>
